name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: Build flavor
        type: choice
        required: true
        default: plus
        options:
          - plus
          - zh
          - exp
      tag_name:
        description: Release tag to create/use (for example: v1.4.6-plus)
        type: string
        required: true
      draft:
        description: Create as draft release
        type: boolean
        required: true
        default: false
      prerelease:
        description: Mark release as prerelease
        type: boolean
        required: true
        default: false
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node.js
        if: ${{ hashFiles('web-ui/package-lock.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Install Web UI dependencies
        if: ${{ hashFiles('web-ui/package-lock.json') != '' }}
        run: npm ci
        working-directory: web-ui

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            FLAVOR="${{ inputs.flavor }}"
            TAG_NAME="${{ inputs.tag_name }}"
            DRAFT="${{ inputs.draft }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            TAG_LOWER="$(printf '%s' "$TAG_NAME" | tr '[:upper:]' '[:lower:]')"

            if [[ "$TAG_LOWER" == *"zh"* ]]; then
              FLAVOR="zh"
            elif [[ "$TAG_LOWER" == *"exp"* ]]; then
              FLAVOR="exp"
            elif [[ "$TAG_LOWER" == *"plus"* ]]; then
              FLAVOR="plus"
            else
              FLAVOR="plus"
            fi

            DRAFT="false"
            PRERELEASE="false"
          fi

          case "$FLAVOR" in
            plus) FLAVOR_CAP="Plus" ;;
            zh) FLAVOR_CAP="Zh" ;;
            exp) FLAVOR_CAP="Exp" ;;
            *)
              echo "Unsupported flavor: $FLAVOR"
              exit 1
              ;;
          esac

          echo "flavor=$FLAVOR" >> "$GITHUB_OUTPUT"
          echo "flavor_cap=$FLAVOR_CAP" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

          echo "Flavor: $FLAVOR"
          echo "FlavorCap: $FLAVOR_CAP"
          echo "Tag: $TAG_NAME"
          echo "Draft: $DRAFT"
          echo "Prerelease: $PRERELEASE"

      - name: Prepare signing files
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ secrets.KEY_BASE64 }}" ]]; then
            printf '%s' "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
            test -s app/app.key
          fi

          if [[ -n "${{ secrets.SIGNING_CONFIG }}" ]]; then
            printf '%s' "${{ secrets.SIGNING_CONFIG }}" > local.properties
            test -s local.properties
          fi

      - name: Make CI gradle.properties compatible
        shell: bash
        run: |
          set -euo pipefail
          sed -i '/^android\.aapt2FromMavenOverride=/d' gradle.properties
          echo "Effective gradle.properties:"
          cat gradle.properties

      - name: Build release APK and AAB
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew

          FLAVOR_CAP="${{ steps.meta.outputs.flavor_cap }}"
          APK_TASK=":app:assemble${FLAVOR_CAP}Release"
          AAB_TASK=":app:bundle${FLAVOR_CAP}Release"

          echo "Running $APK_TASK and $AAB_TASK"
          ./gradlew "$APK_TASK" "$AAB_TASK" --no-daemon --stacktrace

      - name: Collect release files
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          FLAVOR="${{ steps.meta.outputs.flavor }}"
          DIST_DIR="dist"
          APK_DIR="app/build/outputs/apk/${FLAVOR}/release"
          AAB_DIR="app/build/outputs/bundle/${FLAVOR}Release"
          MAPPING_FILE="app/build/outputs/mapping/${FLAVOR}Release/mapping.txt"

          mkdir -p "$DIST_DIR"

          shopt -s nullglob
          apk_files=("$APK_DIR"/*.apk)
          aab_files=("$AAB_DIR"/*.aab)
          shopt -u nullglob

          if (( ${#apk_files[@]} == 0 )); then
            echo "No APK files found in $APK_DIR"
            exit 1
          fi

          cp "${apk_files[@]}" "$DIST_DIR/"

          if (( ${#aab_files[@]} > 0 )); then
            cp "${aab_files[@]}" "$DIST_DIR/"
          fi

          if [[ -f "$MAPPING_FILE" ]]; then
            cp "$MAPPING_FILE" "$DIST_DIR/${FLAVOR}-mapping.txt"
          fi

          (cd "$DIST_DIR" && sha256sum * > SHA256SUMS)

          echo "dist_dir=$DIST_DIR" >> "$GITHUB_OUTPUT"
          echo "Collected files:"
          ls -lah "$DIST_DIR"

      - name: Upload build output (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.meta.outputs.flavor }}-${{ steps.meta.outputs.tag_name }}
          path: ${{ steps.collect.outputs.dist_dir }}/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          DRAFT: ${{ steps.meta.outputs.draft }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release already exists, uploading assets with overwrite"
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            args=(
              "$TAG_NAME"
              dist/*
              --title "$TAG_NAME"
              --notes "Automated Android release for $TAG_NAME"
              --target "$GITHUB_SHA"
            )

            if [[ "$DRAFT" == "true" ]]; then
              args+=(--draft)
            fi

            if [[ "$PRERELEASE" == "true" ]]; then
              args+=(--prerelease)
            fi

            gh release create "${args[@]}"
          fi